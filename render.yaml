services:
  - type: web
    name: tusmo-whatsapp-gateway
    env: node
    buildCommand: "npm install && npx prisma generate && cd whatsapp-gateway && npm install"
    startCommand: "cd whatsapp-gateway && npx ts-node gateway.ts"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
