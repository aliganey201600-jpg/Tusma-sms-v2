services:
  - type: web
    name: tusmo-whatsapp-gateway
    env: node
    buildCommand: "npm install && npx prisma generate && cd whatsapp-gateway && npm install && npx tsc"
    startCommand: "cd whatsapp-gateway && node dist/gateway.js"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
